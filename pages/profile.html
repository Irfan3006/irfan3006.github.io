<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - FanBlog</title>
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Kelola profil dan postingan FanBlog Anda di Dashboard Pengguna.">
  <meta property="og:title" content="User Profile - FanBlog">
  <meta property="og:image" content="https://irfan3006.github.io/assets/img/logo.webp">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .profile-header { background: linear-gradient(135deg, var(--card-bg) 0%, #312e81 100%); border-radius: var(--radius); color: white; padding: 3rem 2rem; text-align: center; margin-bottom: 2rem; position: relative; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container my-5 min-vh-80">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="profile-header shadow">
          <img src="" id="profile-avatar" class="avatar-lg mb-3" alt="Avatar">
          <h2 class="fw-bold mb-1" id="profile-name">Loading...</h2>
          <p class="mb-2 opacity-75" id="profile-role">Role</p>
          <span class="badge bg-white text-primary mt-2 px-3 py-2" id="profile-email">email@example.com</span>
        </div>

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-3">Edit Profile</h5>
            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label">Avatar URL</label>
                <input type="url" class="form-control" id="input-avatar" placeholder="https://example.com/avatar.jpg">
              </div>
              <div class="mb-3">
                <label class="form-label">Bio / About Me</label>
                <textarea class="form-control" id="input-bio" rows="4" placeholder="Tell us about yourself..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            </form>
          </div>
        </div>

        <h4 class="fw-bold mb-4 mt-5">My Posts</h4>
        <div id="my-posts-grid" class="row g-4"></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Auth.requireLogin();
      let user = Auth.getSession();

      document.getElementById('profile-avatar').src = user.avatar;
      document.getElementById('profile-name').innerText = user.username;
      document.getElementById('profile-role').innerText = user.role.toUpperCase();
      document.getElementById('profile-email').innerText = user.email;
      document.getElementById('input-avatar').value = user.avatar;
      document.getElementById('input-bio').value = user.bio || '';

      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const avatar = document.getElementById('input-avatar').value;
        const bio = document.getElementById('input-bio').value;

        const res = await API.updateProfile({ id: user.id, avatar: avatar, bio: bio });
        if (res.success) {
          showToast('success', 'Profile Updated');
          user.avatar = avatar;
          user.bio = bio;
          Auth.setSession(user);
          document.getElementById('profile-avatar').src = avatar;
          updateNavbar();
        } else {
          showToast('error', 'Update Failed', res.message);
        }
      });

      const postsRes = await API.getPosts();
      if (postsRes.success) {
        const myPosts = postsRes.data.filter(p => p.author_id === user.id);
        const grid = document.getElementById('my-posts-grid');
        
        if (myPosts.length === 0) {
          grid.innerHTML = '<div class="col-12 text-center text-muted py-4">You haven\'t written any posts yet.</div>';
        } else {
          grid.innerHTML = myPosts.map(post => {
            const thumb = post.thumbnail || '/assets/img/logo.webp';
            const date = formatDate(post.created_at);
            const safeTitle = escapeHTML(post.title);
            const safeCategory = escapeHTML(post.category);
            const safeThumb = escapeHTML(thumb);
            return `
              <div class="col-md-6 mb-4">
                <div class="card h-100 border-0 shadow-sm">
                  <img src="${safeThumb}" class="card-img-top" style="height: 150px;" alt="${safeTitle}">
                  <div class="card-body">
                    <span class="badge bg-light text-dark mb-2">${safeCategory}</span>
                    <h6 class="card-title fw-bold"><a href="/pages/post.html?slug=${encodeURIComponent(post.slug)}">${safeTitle}</a></h6>
                    <p class="text-muted small">${date}</p>
                  </div>
                  <div class="card-footer bg-white border-top-0 d-flex justify-content-between pb-3">
                    <a href="/pages/edit-post.html?id=${encodeURIComponent(post.id)}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteMyPost('${escapeHTML(post.id)}')">Delete</button>
                  </div>
                </div>
              </div>
            `;
          }).join('');
        }
      }

      window.deleteMyPost = async (id) => {
        const result = await Swal.fire({
          title: 'Are you sure?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#dc3545',
          confirmButtonText: 'Yes, delete it!'
        });

        if (result.isConfirmed) {
          const res = await API.deletePost(id, user.id);
          if (res.success) {
            showToast('success', 'Post deleted');
            setTimeout(() => { window.location.reload(); }, 1000);
          } else {
            showToast('error', 'Error', res.message);
          }
        }
      };
    });
  </script>
</body>
</html>
