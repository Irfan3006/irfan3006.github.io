<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post - FanBlog</title>
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <link rel="stylesheet" href="/assets/css/style.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
  <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.1.2/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    .editor-container {
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="container my-5 min-vh-80 editor-container">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h2 class="fw-bold mb-4">Edit Post</h2>
        
        <form id="editPostForm" style="display: none;">
          <div class="mb-4">
            <label class="form-label fw-500">Post Title</label>
            <input type="text" class="form-control form-control-lg" id="title" required>
          </div>
          
          <div class="row mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
              <label class="form-label fw-500">Category</label>
              <select class="form-select" id="category" required>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-500">Thumbnail Image URL</label>
              <input type="url" class="form-control" id="thumbnail">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-500">Content</label>
            <textarea id="contentEditor"></textarea>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
            <a href="javascript:history.back()" class="btn btn-light px-4">Cancel</a>
            <button type="submit" class="btn btn-primary px-4">Update Post</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/categories.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Auth.requireLogin();
      const user = Auth.getSession();
      
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (!postId) {
        window.location.href = '/';
        return;
      }

      let simplemde;

      const res = await API.getPosts();
      if (res.success) {
        const post = res.data.find(p => p.id === postId);
        
        if (post) {
          if (post.author_id !== user.id && user.role !== 'admin') {
            showToast('error', 'Unauthorized', 'You cannot edit this post');
            setTimeout(() => window.location.href = '/', 1500);
            return;
          }

          populateCategorySelect('category', post.category);
          document.getElementById('title').value = post.title;
          document.getElementById('thumbnail').value = post.thumbnail || '';
          
          const turndownService = new TurndownService();
          const markdownContent = turndownService.turndown(post.content);

          document.getElementById('contentEditor').value = markdownContent;

          document.getElementById('editPostForm').style.display = 'block';
          
          simplemde = new SimpleMDE({ 
            element: document.getElementById("contentEditor"),
            spellChecker: false
          });
        } else {
          showToast('error', 'Not Found', 'Post not found');
          window.location.href = '/';
        }
      }

      document.getElementById('editPostForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const thumbnail = document.getElementById('thumbnail').value;
        const markdownContent = simplemde.value();
        
        if (!markdownContent) {
          showToast('error', 'Error', 'Content cannot be empty');
          return;
        }

        const htmlContent = marked.parse(markdownContent);

        const postData = {
          id: postId,
          user_id: user.id,
          title: title,
          category: category,
          thumbnail: thumbnail,
          content: htmlContent
        };

        const updateRes = await API.updatePost(postData);
        if (updateRes.success) {
          showToast('success', 'Post Updated!');
          setTimeout(() => {
            window.location.href = `post.html?slug=${updateRes.data.slug}`;
          }, 1500);
        } else {
          showToast('error', 'Update Failed', updateRes.message);
        }
      });
    });
  </script>
</body>
</html>
