<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="meta-title">Post - FanBlog</title>
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
  <meta name="description" id="meta-description" content="Baca artikel lengkap di FanBlog.">
  
  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" id="og-title" content="FanBlog Post">
  <meta property="og:description" id="og-description" content="Baca artikel lengkap di FanBlog.">
  <meta property="og:image" id="og-image" content="/assets/img/logo.webp">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" id="tw-title" content="FanBlog Post">
  <meta property="twitter:description" id="tw-description" content="Baca artikel lengkap di FanBlog.">
  <meta property="twitter:image" id="tw-image" content="/assets/img/logo.webp">
  
  <link rel="canonical" id="canonical-url" href="">
  <meta property="og:url" id="og-url" content="">
  <script type="application/ld+json" id="structured-data"></script>
  <script type='text/javascript' src='https://platform-api.sharethis.com/js/sharethis.js#property=698357388ea334cc0e5b7c25&product=sop' async='async'></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .post-header { max-width: 800px; margin: 0 auto; text-align: center; }
    .post-content { max-width: 800px; margin: 0 auto; font-size: 1.1rem; line-height: 1.8; color: var(--paragraph); }
    .post-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; }
    .post-thumbnail { width: 100%; max-height: 500px; height: auto; aspect-ratio: 2 / 1; object-fit: cover; border-radius: var(--radius); margin-bottom: 2rem; }
    .author-box { background: var(--card-bg); border-radius: var(--radius); padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem; margin-top: 3rem; border: 1px solid var(--stroke); }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="container my-5 min-vh-80" id="post-container" style="display: none;">
    <div id="post-actions" class="text-end mb-3 d-flex justify-content-end gap-2" style="max-width: 800px; margin: 0 auto;"></div>

    <div class="post-header mb-4">
      <a href="#" id="category-link" class="text-decoration-none">
        <span class="badge bg-primary bg-opacity-10 text-primary mb-3 px-3 py-2 fs-6" id="post-category">Category</span>
      </a>
      <h1 class="fw-bold display-5 mb-3" id="post-title">Loading...</h1>
      <p class="text-muted mb-4" id="post-meta">By Author • Date</p>
      <div class="sharethis-inline-share-buttons mb-4"></div>
    </div>

    <div style="max-width: 800px; margin: 0 auto;">
      <img src="" id="post-thumbnail" class="post-thumbnail shadow-sm d-none" alt="Thumbnail">
    </div>

    <div class="post-content" id="post-body"></div>

    <div class="author-box mx-auto" style="max-width: 800px;">
      <img src="" id="author-avatar" class="rounded-circle" style="width: 80px; height: 80px; object-fit: cover;" alt="Author">
      <div>
        <h5 class="fw-bold mb-1" id="author-name">Author Name</h5>
        <p class="text-muted mb-0" style="font-size: 0.95rem;" id="author-bio">Konten Kreator di FanBlog</p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const postSlug = urlParams.get('slug');

      if (!postSlug) { window.location.href = '/index.html'; return; }

      const user = Auth.getSession();
      const res = await API.getPosts();
      if (res.success) {
        const post = res.data.find(p => p.slug === postSlug);
        if (post) {
          document.getElementById('post-title').innerText = post.title;
          document.getElementById('post-category').innerText = post.category;
          document.getElementById('category-link').href = `/index.html?category=${encodeURIComponent(post.category)}`;
          document.getElementById('post-meta').innerText = `Oleh ${post.author_name} \u2022 ${new Date(post.created_at).toLocaleDateString()}`;
          document.getElementById('post-body').innerHTML = sanitizeHTML(post.content);
          
          const plainContent = document.getElementById('post-body').textContent.substring(0, 160).replace(/\s+/g, ' ') + '...';
          document.title = `${post.title} - FanBlog`;
          document.getElementById('meta-description').content = plainContent;
          document.getElementById('og-title').content = post.title;
          document.getElementById('og-description').content = plainContent;
          document.getElementById('tw-title').content = post.title;
          document.getElementById('tw-description').content = plainContent;

          const defaultThumb = window.location.origin + '/assets/img/logo.webp';
          const thumb = post.thumbnail && post.thumbnail.startsWith('http') ? post.thumbnail : (window.location.origin + (post.thumbnail || '/assets/img/logo.webp'));
          
          document.getElementById('og-image').content = thumb;
          document.getElementById('tw-image').content = thumb;

          // Update URLs
          const currentUrl = window.location.href;
          document.getElementById('og-url').content = currentUrl;
          const canonicalUrl = document.getElementById('canonical-url');
          if (canonicalUrl) canonicalUrl.href = currentUrl;

          // Structured Data (JSON-LD)
          const jsonLd = {
            "@context": "https://schema.org",
            "@type": "BlogPosting",
            "headline": post.title,
            "image": [thumb],
            "datePublished": post.created_at,
            "dateModified": post.updated_at || post.created_at,
            "author": [{
                "@type": "Person",
                "name": post.author_name,
                "url": window.location.origin + `/pages/profile.html?user=${post.author_id}`
            }]
          };
          document.getElementById('structured-data').textContent = JSON.stringify(jsonLd);

          const thumbEl = document.getElementById('post-thumbnail');
          thumbEl.src = thumb;
          thumbEl.classList.remove('d-none');
          thumbEl.onerror = function() { this.src = defaultThumb; };

          document.getElementById('author-name').innerText = post.author_name;
          document.getElementById('author-avatar').src = post.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.author_name)}&size=128`;
          document.getElementById('author-bio').innerText = post.author_bio || 'Konten Kreator di FanBlog';

          if (user && (user.id === post.author_id || user.role === 'admin')) {
            document.getElementById('post-actions').innerHTML += `
              <a href="/pages/edit-post.html?id=${post.id}" class="btn btn-outline-secondary"><i class="bi bi-pencil"></i> Edit</a>
              <button class="btn btn-outline-danger" onclick="deletePost('${post.id}')"><i class="bi bi-trash"></i> Hapus</button>
            `;
          }
          document.getElementById('post-container').style.display = 'block';
          
          // Trigger ShareThis to re-scan the DOM for buttons
          if (window.__sharethis__ && typeof window.__sharethis__.initialize === 'function') {
            window.__sharethis__.initialize();
          }
        } else {
          showToast('error', 'Error', 'Post not found');
        }
      }

      window.deletePost = async (id) => {
        const result = await Swal.fire({
          title: 'Apakah Anda yakin?',
          text: "Anda tidak akan dapat mengembalikan ini!",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#dc3545',
          confirmButtonText: 'Ya, hapus!',
          cancelButtonText: 'Batal'
        });

        if (result.isConfirmed) {
          const res = await API.deletePost(id, user.id);
          if (res.success) {
            showToast('success', 'Postingan dihapus');
            setTimeout(() => { window.location.href = '/index.html'; }, 1000);
          } else {
            showToast('error', 'Error', res.message);
          }
        }
      };


    });
  </script>
</body>
</html>
